services:
  # Busca automática diária às 12h
  licitacoes-cron:
    build: .
    container_name: licitacoes-cron
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - relatorios:/app/relatorios
      - cache_municipios:/app/cache
    command: ["--agendar"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M


  # MCP Server — expõe dados para análise por IA
  licitae-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: licitae-mcp
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M


volumes:
  relatorios:
  cache_municipios:
