services:
  # Busca automática diária às 12h
  licitacoes-cron:
    build: .
    container_name: licitacoes-cron
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - relatorios:/app/relatorios
      - cache_municipios:/app/cache
    command: ["--agendar"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # Auto-update: monitora Docker Hub e recria container com nova imagem
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=America/Sao_Paulo
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # checa 1x por dia
      - WATCHTOWER_MONITOR_ONLY=false
    restart: unless-stopped

volumes:
  relatorios:
  cache_municipios:
