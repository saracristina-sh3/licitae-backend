services:
  # Busca automática diária às 12h
  licitacoes-cron:
    build: .
    container_name: licitacoes-cron
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - relatorios:/app/relatorios
      - cache_municipios:/app/cache
    command: ["--agendar"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M


volumes:
  relatorios:
  cache_municipios:
